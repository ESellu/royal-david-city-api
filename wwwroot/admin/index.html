    <link rel="stylesheet" href="/site.css">
    <style>
        body {
            background: #0b0b0b;
            color: #f5f5f5;
            font-family: 'Josefin Sans',sans-serif;
            margin: 0;
        }

        .admin-wrap {
            max-width: 1100px; /* wider */
            margin: 2rem auto; /* still centered but much wider */
            padding: 2rem;
            border-radius: 8px;
            background: #151515;
            border: 1px solid #333;
            min-height: 80vh;
        }

            .admin-wrap h1 {
                font-family: 'Cinzel',serif;
                font-size: 1.3rem;
                margin-bottom: 1rem;
            }

        .fg {
            margin-bottom: 0.9rem;
        }

            .fg label {
                display: block;
                font-size: 0.7rem;
                margin-bottom: 0.25rem;
            }

            .fg input {
                width: 100%;
                padding: 0.6rem 0.7rem;
                border-radius: 4px;
                border: 1px solid #333;
                background: #111;
                color: #f5f5f5;
            }

        .admin-btn {
            width: 100%;
            margin-top: 0.4rem;
            padding: 0.7rem;
            border-radius: 4px;
            border: none;
            background: linear-gradient(135deg,#d4af37,#f5e6b8);
            color: #2b1d0b;
            font-size: 0.8rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
        }

        .admin-msg {
            margin-top: 0.7rem;
            font-size: 0.8rem;
        }

        .forgot-link {
            display: none;
            margin-top: 0.4rem;
            font-size: 0.75rem;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="admin-wrap" id="admin-root">
        <!-- content will be filled by admin.js -->
    </div>

    <script src="/admin/admin.js"></script>
</body>
</html>
